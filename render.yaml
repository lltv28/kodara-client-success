services:
  - type: web
    name: kodara-client-success
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run copy-prompts && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: kodara-data
      mountPath: /data
      sizeGB: 1
